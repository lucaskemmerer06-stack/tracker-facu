<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tracker Facu · Bioingeniería</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f7f5f0;
    --surface: #ffffff;
    --surface2: #f0ede6;
    --border: rgba(0,0,0,0.08);
    --border2: rgba(0,0,0,0.14);
    --text: #1a1916;
    --text2: #6b6860;
    --text3: #a09d98;
    --radius: 12px;
    --radius-sm: 8px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #141412;
      --surface: #1e1d1a;
      --surface2: #272521;
      --border: rgba(255,255,255,0.08);
      --border2: rgba(255,255,255,0.14);
      --text: #f0ede6;
      --text2: #9a9790;
      --text3: #5a5855;
    }
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 0 0 60px;
  }

  /* HEADER */
  .app-header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 20px 24px 16px;
    position: sticky; top: 0; z-index: 10;
  }
  .app-header h1 {
    font-size: 18px; font-weight: 600; letter-spacing: -0.3px;
    color: var(--text);
  }
  .app-header p { font-size: 12px; color: var(--text3); margin-top: 2px; font-family: 'DM Mono', monospace; }

  /* MAIN */
  .main { max-width: 900px; margin: 0 auto; padding: 20px 16px; }

  /* WEEK NAV */
  .week-nav {
    display: flex; align-items: center; justify-content: space-between;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 12px 16px;
    margin-bottom: 16px;
  }
  .week-nav-btns { display: flex; align-items: center; gap: 10px; }
  .nav-btn {
    width: 32px; height: 32px; border-radius: var(--radius-sm);
    border: 1px solid var(--border2); background: transparent;
    cursor: pointer; color: var(--text2); font-size: 14px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .nav-btn:hover { background: var(--surface2); color: var(--text); }
  .week-label { font-size: 14px; font-weight: 500; color: var(--text); }
  .today-btn {
    font-size: 11px; font-family: 'DM Mono', monospace;
    background: var(--surface2); border: 1px solid var(--border2);
    border-radius: 6px; padding: 4px 10px;
    cursor: pointer; color: var(--text2); transition: all 0.15s;
  }
  .today-btn:hover { color: var(--text); }

  /* STATS */
  .stats-grid {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px;
    margin-bottom: 20px;
  }
  @media (max-width: 500px) { .stats-grid { grid-template-columns: repeat(2, 1fr); } }
  .stat-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 14px 16px;
  }
  .stat-card .lbl { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
  .stat-card .val { font-size: 28px; font-weight: 600; line-height: 1; color: var(--text); }
  .stat-card .sub { font-size: 11px; color: var(--text3); margin-top: 4px; }

  /* TABLE */
  .table-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; margin-bottom: 20px; overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; min-width: 580px; }
  thead th {
    font-size: 11px; font-weight: 500; color: var(--text3);
    text-align: center; padding: 10px 6px;
    border-bottom: 1px solid var(--border);
    font-family: 'DM Mono', monospace;
    text-transform: uppercase; letter-spacing: 0.4px;
  }
  thead th.act-head { text-align: left; padding-left: 16px; min-width: 150px; }
  thead th.today-col { color: var(--text); }

  .mat-row td {
    padding: 10px 16px 4px;
    font-size: 12px; font-weight: 600;
    letter-spacing: 0.2px;
    border-top: 1px solid var(--border);
  }
  .mat-row:first-child td { border-top: none; }
  .mat-name-wrap { display: flex; align-items: center; gap: 7px; }
  .mat-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .especial-tag {
    font-size: 9px; font-family: 'DM Mono', monospace;
    padding: 2px 7px; border-radius: 10px; font-weight: 500;
    margin-left: 4px; letter-spacing: 0.3px; text-transform: uppercase;
  }

  .act-row td { padding: 3px 4px; }
  .act-row td:first-child { font-size: 12px; color: var(--text3); padding-left: 28px; white-space: nowrap; }

  .ck-cell { text-align: center; }
  .ck {
    width: 32px; height: 32px; border-radius: 9px;
    border: 1.5px solid var(--border2);
    background: transparent; cursor: pointer;
    display: inline-flex; align-items: center; justify-content: center;
    transition: all 0.12s; font-size: 14px; color: transparent;
    font-family: 'DM Sans', sans-serif;
  }
  .ck:hover:not(.future) { border-color: var(--border2); background: var(--surface2); }
  .ck.future { opacity: 0.25; cursor: default; }
  .ck.on { color: white !important; border-color: transparent !important; }

  /* PROGRESS */
  .prog-section { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px 20px; }
  .prog-title { font-size: 12px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 14px; }
  .prog-row { margin-bottom: 10px; }
  .prog-row:last-child { margin-bottom: 0; }
  .prog-meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
  .prog-name { font-size: 12px; color: var(--text2); font-weight: 500; }
  .prog-count { font-size: 11px; font-family: 'DM Mono', monospace; color: var(--text3); }
  .prog-track { height: 4px; background: var(--surface2); border-radius: 2px; overflow: hidden; }
  .prog-fill { height: 100%; border-radius: 2px; transition: width 0.35s ease; }

  /* LEGEND */
  .legend { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 16px; }
  .leg-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text2); }
  .leg-swatch { width: 20px; height: 20px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 11px; color: white; font-weight: 600; }

  .day-num { font-size: 11px; display: block; margin-top: 1px; font-family: 'DM Mono', monospace; }
  .today-dot { display: inline-block; width: 5px; height: 5px; border-radius: 50%; background: #378ADD; margin-left: 3px; vertical-align: middle; margin-bottom: 2px; }
</style>
</head>
<body>

<div class="app-header">
  <h1>Tracker Facu</h1>
  <p>Bioingeniería · Plan 2025 · 3er año · 1er cuatrimestre</p>
</div>

<div class="main">

  <div class="week-nav">
    <div class="week-nav-btns">
      <button class="nav-btn" id="prev">&#8592;</button>
      <span class="week-label" id="wlbl"></span>
      <button class="nav-btn" id="next">&#8594;</button>
    </div>
    <button class="today-btn" id="todayBtn">hoy</button>
  </div>

  <div class="stats-grid">
    <div class="stat-card"><div class="lbl">Esta semana</div><div class="val" id="st0">0</div><div class="sub">actividades</div></div>
    <div class="stat-card"><div class="lbl">Estudio</div><div class="val" id="st1" style="color:#7F77DD">0</div><div class="sub">días</div></div>
    <div class="stat-card"><div class="lbl">TP / ejerc.</div><div class="val" id="st2" style="color:#1D9E75">0</div><div class="sub">días</div></div>
    <div class="stat-card"><div class="lbl">Racha</div><div class="val" id="st3">0</div><div class="sub">días seguidos</div></div>
  </div>

  <div class="legend">
    <div class="leg-item"><div class="leg-swatch" style="background:#7F77DD">E</div>Estudiar / repasar</div>
    <div class="leg-item"><div class="leg-swatch" style="background:#1D9E75">T</div>TP / ejercicios</div>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th class="act-head">Materia / Actividad</th>
          <th id="h0"></th><th id="h1"></th><th id="h2"></th><th id="h3"></th>
          <th id="h4"></th><th id="h5"></th><th id="h6"></th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>

  <div class="prog-section">
    <div class="prog-title">Progreso semanal por materia</div>
    <div id="progRows"></div>
  </div>

</div>

<script>
const MATERIAS = [
  { id:'alg',    name:'Álgebra y cálculo 2',         color:'#7F77DD' },
  { id:'anat',   name:'Anatomía y fisiología 1',      color:'#1D9E75' },
  { id:'em',     name:'Electromagnetismo y óptica',   color:'#D85A30' },
  { id:'prog',   name:'Fundamentos de programación',  color:'#BA7517' },
  { id:'taller', name:'Taller de electrónica',        color:'#185FA5' },
  { id:'isalud', name:'Intro. Sistemas de Salud',     color:'#993556' },
  { id:'fisica', name:'Física mecánica',              color:'#5F5E5A', especial:true },
];
const ACTS = [
  { id:'est', label:'Estudiar / repasar', color:'#7F77DD' },
  { id:'tp',  label:'TP / ejercicios',    color:'#1D9E75' },
];
const DAYS = ['LUN','MAR','MIÉ','JUE','VIE','SÁB','DOM'];

let weekOffset = 0;

function monday(d) {
  const x = new Date(d); x.setHours(0,0,0,0);
  const day = x.getDay();
  x.setDate(x.getDate() + (day===0 ? -6 : 1-day));
  return x;
}
function weekDates(off) {
  const m = monday(new Date());
  m.setDate(m.getDate() + off*7);
  return Array.from({length:7}, (_,i) => { const d=new Date(m); d.setDate(m.getDate()+i); return d; });
}
function dk(d) { return d.toISOString().slice(0,10); }
function wk(dates) { return 'bio_tracker_' + dk(dates[0]); }

function loadData(key) {
  try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : {}; } catch { return {}; }
}
function saveData(key, data) {
  try { localStorage.setItem(key, JSON.stringify(data)); } catch {}
}

function fmtWeek(dates) {
  const o = {day:'numeric', month:'short'};
  return dates[0].toLocaleDateString('es-AR', o) + ' – ' + dates[6].toLocaleDateString('es-AR', o);
}

function updateStats(data, dates) {
  const today = new Date(); today.setHours(0,0,0,0);
  let total=0, estDays=0, tpDays=0;
  dates.forEach(d => {
    const day = data[dk(d)] || {};
    let hE=false, hT=false;
    MATERIAS.forEach(m => {
      if(day[m.id]?.est){ total++; hE=true; }
      if(day[m.id]?.tp){ total++; hT=true; }
    });
    if(hE) estDays++;
    if(hT) tpDays++;
  });
  document.getElementById('st0').textContent = total;
  document.getElementById('st1').textContent = estDays;
  document.getElementById('st2').textContent = tpDays;

  let streak=0;
  const past = [...dates].filter(d=>d<=today).sort((a,b)=>b-a);
  for(const d of past){
    const day = data[dk(d)] || {};
    if(MATERIAS.some(m=>day[m.id]?.est||day[m.id]?.tp)) streak++;
    else break;
  }
  document.getElementById('st3').textContent = streak;

  const progRows = document.getElementById('progRows');
  progRows.innerHTML = '';
  MATERIAS.forEach(m => {
    let cnt = dates.filter(d => { const day=data[dk(d)]||{}; return day[m.id]?.est||day[m.id]?.tp; }).length;
    const pct = Math.round(cnt/7*100);
    const row = document.createElement('div'); row.className='prog-row';
    row.innerHTML = `<div class="prog-meta"><span class="prog-name" style="color:${m.color}">${m.name}</span><span class="prog-count">${cnt}/7</span></div><div class="prog-track"><div class="prog-fill" style="width:${pct}%;background:${m.color}"></div></div>`;
    progRows.appendChild(row);
  });
}

function render() {
  const dates = weekDates(weekOffset);
  const key = wk(dates);
  const data = loadData(key);
  const today = new Date(); today.setHours(0,0,0,0);

  document.getElementById('wlbl').textContent = fmtWeek(dates);

  dates.forEach((d,i) => {
    const th = document.getElementById('h'+i);
    const isToday = d.getTime()===today.getTime();
    th.className = isToday ? 'today-col' : '';
    th.innerHTML = DAYS[i] + `<span class="day-num">${d.getDate()}</span>` + (isToday ? '<span class="today-dot"></span>' : '');
  });

  const tbody = document.getElementById('tbody');
  tbody.innerHTML = '';

  MATERIAS.forEach(m => {
    const hrow = document.createElement('tr');
    hrow.className = 'mat-row';
    const htd = document.createElement('td');
    htd.colSpan = 8;
    htd.innerHTML = `<div class="mat-name-wrap"><div class="mat-dot" style="background:${m.color}"></div><span style="color:${m.color}">${m.name}</span>${m.especial?`<span class="especial-tag" style="background:${m.color}22;color:${m.color}">llamado especial</span>`:''}</div>`;
    hrow.appendChild(htd);
    tbody.appendChild(hrow);

    ACTS.forEach(act => {
      const tr = document.createElement('tr');
      tr.className = 'act-row';
      const nameTd = document.createElement('td');
      nameTd.textContent = act.label;
      tr.appendChild(nameTd);

      dates.forEach(d => {
        const k = dk(d);
        const isFuture = d > today;
        const checked = !!(data[k]?.[m.id]?.[act.id]);
        const td = document.createElement('td');
        td.className = 'ck-cell';
        const btn = document.createElement('button');
        btn.className = 'ck' + (isFuture?' future':'') + (checked?' on':'');
        btn.style.background = checked ? act.color : '';
        btn.textContent = checked ? '✓' : '';

        if(!isFuture){
          btn.addEventListener('click', () => {
            if(!data[k]) data[k]={};
            if(!data[k][m.id]) data[k][m.id]={};
            const now = !data[k][m.id][act.id];
            data[k][m.id][act.id] = now;
            saveData(key, data);
            btn.classList.toggle('on', now);
            btn.style.background = now ? act.color : '';
            btn.textContent = now ? '✓' : '';
            updateStats(data, dates);
          });
        }
        td.appendChild(btn); tr.appendChild(td);
      });
      tbody.appendChild(tr);
    });
  });

  updateStats(data, dates);
}

document.getElementById('prev').addEventListener('click', ()=>{ weekOffset--; render(); });
document.getElementById('next').addEventListener('click', ()=>{ weekOffset++; render(); });
document.getElementById('todayBtn').addEventListener('click', ()=>{ weekOffset=0; render(); });

render();
</script>
</body>
</html>
